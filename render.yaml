databases:
  - name: billiard-db
    plan: free

services:
  - type: web
    name: billiard-diary
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn billiard_diary.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: billiard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: TIME_ZONE
        value: "Asia/Shanghai"
      - key: CLOUDINARY_URL
        sync: false
      - key: USE_CLOUDINARY_MEDIA
        value: "True"
