<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>台球战绩记录</title>
    <style>
      :root {
        --bg: #0b1220;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.1);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --brand: #7c3aed;
        --brand-2: #22c55e;
        --danger: #ef4444;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 14px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --surface: rgba(255, 255, 255, 0.95);
          --surface-2: rgba(15, 23, 42, 0.06);
          --text: rgba(15, 23, 42, 0.92);
          --muted: rgba(15, 23, 42, 0.7);
          --border: rgba(15, 23, 42, 0.12);
          --shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        }
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1000px 550px at 20% 10%, rgba(124, 58, 237, 0.28), transparent 55%),
          radial-gradient(900px 520px at 85% 0%, rgba(34, 197, 94, 0.18), transparent 60%),
          var(--bg);
      }

      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .container {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .brand-badge {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        box-shadow: 0 12px 26px rgba(124, 58, 237, 0.35);
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--muted);
        text-decoration: none;
      }
      .pill:hover { color: var(--text); text-decoration: none; border-color: rgba(124, 58, 237, 0.35); }
      .pill strong { color: var(--text); font-weight: 650; }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        font-weight: 650;
        transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      }
      .btn:hover { transform: translateY(-1px); border-color: rgba(124, 58, 237, 0.35); text-decoration: none; }
      .btn-primary { background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(99, 102, 241, 0.95)); border-color: rgba(124, 58, 237, 0.45); }
      .btn-primary:hover { border-color: rgba(124, 58, 237, 0.7); }

      .page-title { margin: 18px 0 12px; font-size: 26px; letter-spacing: 0.2px; }
      .subtle { color: var(--muted); margin: 0 0 14px; }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .grid { display: grid; gap: 14px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }

      label { display: block; font-weight: 650; margin-bottom: 6px; }
      input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.08);
        color: var(--text);
        outline: none;
      }
      @media (prefers-color-scheme: light) {
        input, select, textarea { background: rgba(255, 255, 255, 0.9); }
      }
      textarea { min-height: 110px; resize: vertical; }
      input:focus, select:focus, textarea:focus { border-color: rgba(124, 58, 237, 0.55); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.16); }

      .field { display: grid; gap: 6px; }
      .field .help { color: var(--muted); font-size: 13px; }
      .errors { margin: 8px 0 0; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.35); background: rgba(239, 68, 68, 0.1); }
      .errors ul { margin: 0; padding-left: 18px; }

      .table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 14px;
        border: 1px solid var(--border);
      }
      .table th, .table td { padding: 12px 12px; text-align: left; border-bottom: 1px solid var(--border); }
      .table th { color: var(--muted); font-weight: 700; background: var(--surface-2); }
      .table tr:hover td { background: rgba(124, 58, 237, 0.08); }
      .table td:last-child, .table th:last-child { text-align: right; }

      .media-grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      @media (max-width: 860px) { .media-grid { grid-template-columns: 1fr; } }
      .media-item { padding: 10px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-2); }
      .media-item img, .media-item video { width: 100%; height: auto; border-radius: 12px; display: block; }
      .footer-links { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

      .badge-8ball, .badge-score {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .badge-8ball { background: rgba(124, 58, 237, 0.28); color: rgba(167, 139, 250, 0.95); border: 1px solid rgba(124, 58, 237, 0.4); }
      .badge-score { background: rgba(34, 197, 94, 0.22); color: rgba(74, 222, 128, 0.95); border: 1px solid rgba(34, 197, 94, 0.38); }
      @media (prefers-color-scheme: light) {
        .badge-8ball { background: rgba(124, 58, 237, 0.14); color: #6d28d9; }
        .badge-score { background: rgba(34, 197, 94, 0.14); color: #15803d; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <a class="brand" href="{% url 'diary:record_list' %}">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>台球战绩记录</span>
        </a>

        <nav class="nav">
          <a class="btn btn-primary" href="{% url 'diary:game_start' %}" style="background:linear-gradient(135deg, rgba(34,197,94,0.95), rgba(16,185,129,0.95)); border-color:rgba(34,197,94,0.45);">开灯</a>
          <a class="btn" href="{% url 'diary:moments' %}">朋友圈</a>
          <form action="{% url 'diary:user_search' %}" method="get" style="display:flex;gap:6px;align-items:center;">
            <input type="text" name="username" placeholder="查看他人记录" value="{{ request.GET.username|default:'' }}"
              style="width:130px;padding:7px 10px;border-radius:999px;font-size:13px;border:1px solid var(--border);background:var(--surface);color:var(--text);" />
            <button type="submit" class="pill" style="background:rgba(124,58,237,0.22);border:1px solid rgba(124,58,237,0.4);color:rgba(167,139,250,0.95);cursor:pointer;padding:7px 12px;font-size:13px;font-weight:700;border-radius:999px;white-space:nowrap;">查询</button>
          </form>
          {% if user.is_authenticated %}
            <a class="btn btn-primary" href="{% url 'diary:record_new' %}">新增当天记录</a>
            <span class="pill">当前用户：<strong>{{ user.username }}</strong></span>
            <a class="btn" href="{% url 'diary:logout' %}">退出</a>
          {% else %}
            <a class="btn btn-primary" href="{% url 'diary:login' %}">登录</a>
            <a class="btn" href="{% url 'diary:register' %}">注册</a>
          {% endif %}
        </nav>
      </header>

      {% if messages %}
        <div class="card" style="margin-top: 14px;">
          {% for message in messages %}
            <p style="margin: 0 0 8px;">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <main style="margin-top: 14px;">{% block content %}{% endblock %}</main>
    </div>
  </body>
</html>
