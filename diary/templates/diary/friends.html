{% extends "diary/base.html" %}

{% block content %}
  <div class="page-header-actions">
    <div class="page-header-title">
      <div class="page-title-row">
        <span class="page-title-mark" aria-hidden="true"></span>
        <h1 class="page-title">好友</h1>
      </div>
      <p class="subtle">查看好友，点击用户名可以进入对方主页。</p>
    </div>
    <div class="page-header-buttons">
      <a class="btn btn-primary" href="{% url 'diary:friend_add' %}">添加好友</a>
      <a class="btn" href="{% url 'diary:friend_requests' %}">收到的好友申请：（{{ pending_count }}）</a>
      <a class="btn" href="{% url 'diary:record_list' %}">返回</a>
    </div>
  </div>

  <div class="card">
    {% if friends %}
      <div style="display:grid;gap:10px;">
        {% for friend in friends %}
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <a class="btn" href="{% url 'diary:public_profile' friend.username %}?from=friends" style="justify-content:flex-start;flex:1;">
              {{ friend.username }}
            </a>
            <a class="btn" href="{% url 'diary:private_message_new' friend.username %}">私信</a>
            <a class="btn btn-primary" href="{% url 'diary:direct_battle_new' friend.username %}">约战</a>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <p style="margin:0;">暂无好友。</p>
    {% endif %}
  </div>
{% endblock %}
