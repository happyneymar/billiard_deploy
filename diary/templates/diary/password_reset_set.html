{% extends "diary/base.html" %}

{% block content %}
  <h1>设置新密码</h1>
  <p>正在为用户 <strong>{{ username }}</strong> 设置新密码</p>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div>
      <label>新密码：</label>
      {{ form.new_password1 }}
      {{ form.new_password1.errors }}
    </div>
    <div>
      <label>确认新密码：</label>
      {{ form.new_password2 }}
      {{ form.new_password2.errors }}
    </div>
    <div style="margin-top: 12px;">
      <button type="submit">确认修改</button>
    </div>
  </form>
{% endblock %}
