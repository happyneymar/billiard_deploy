{% extends "diary/base.html" %}

{% block content %}
  <div class="page-header-actions">
    <div class="page-header-title">
      <div class="page-title-row">
        <span class="page-title-mark" aria-hidden="true"></span>
        <h1 class="page-title">添加好友</h1>
      </div>
      <p class="subtle">输入对方用户名，向对方发送好友申请。</p>
    </div>
    <div class="page-header-buttons">
      <a class="btn" href="{% url 'diary:friend_requests' %}">收到的好友申请：（{{ pending_count }}）</a>
      <a class="btn" href="{% url 'diary:friends' %}">返回</a>
    </div>
  </div>

  <div class="card">
    <form method="post" class="grid" style="gap:12px;">
      {% csrf_token %}
      <div class="field">
        <label for="id_friend_username">好友用户名</label>
        <input id="id_friend_username" type="text" name="username" placeholder="输入用户名" required>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" type="submit">发送好友申请</button>
      </div>
    </form>
  </div>
{% endblock %}
